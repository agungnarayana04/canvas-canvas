<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS CANVAS | Neo-Brutalist Pixel Art & SVG Editor</title>
    <meta name="description"
        content="An ultra-premium, interactive Neo-Brutalist pixel art creator and frame animator. Export CSS, SVG, and high-res PNGs.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>

    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="app-header">
        <div class="logo-container">
            <span class="logo-icon">👾</span>
            <h1>CANVAS CANVAS</h1>
        </div>
        <div class="header-tagline">NEO-BRUTALIST PIXEL EDITOR</div>
        <div class="header-actions">
            <button id="btn-github" class="brutal-btn btn-sm" onclick="window.open('https://github.com', '_blank')">
                <i data-lucide="github"></i> GitHub Pages ready
            </button>
        </div>
    </header>

    <!-- GONG -->
    <!-- Bagian ini untuk body toolbar tools bagian kiri untuk draw, bucket, eraser, dan picker -->
    <main class="app-body">
        <!-- TOOLBAR (Left) -->
        <aside class="sidebar tools-sidebar">
            <div class="sidebar-section">
                <h2>TOOLS</h2>
                <div class="tool-grid">
                    <button id="tool-draw" class="brutal-btn tool-btn active" title="Draw (D)">
                        <i data-lucide="pencil"></i>
                        <span>Draw</span>
                    </button>
                    <button id="tool-fill" class="brutal-btn tool-btn" title="Paint Bucket (F)">
                        <i data-lucide="paint-bucket"></i>
                        <span>Bucket</span>
                    </button>
                    <button id="tool-eraser" class="brutal-btn tool-btn" title="Eraser (E)">
                        <i data-lucide="eraser"></i>
                        <span>Eraser</span>
                    </button>
                    <button id="tool-picker" class="brutal-btn tool-btn" title="Color Picker (P)">
                        <i data-lucide="pipette"></i>
                        <span>Picker</span>
                    </button>
                </div>
            </div>
            <!-- GONG -->
            <!-- Bagian ini untuk body toolbar actions bagian kiri untuk redo, undo, grid lines, fill canvas, clear frame -->
            <div class="sidebar-section">
                <h2>ACTIONS</h2>
                <div class="action-list">
                    <button id="action-undo" class="brutal-btn" title="Undo (Ctrl+Z)">
                        <i data-lucide="undo-2"></i> Undo
                    </button>
                    <button id="action-redo" class="brutal-btn" title="Redo (Ctrl+Y)">
                        <i data-lucide="redo-2"></i> Redo
                    </button>
                    <button id="action-grid-toggle" class="brutal-btn active" title="Toggle Grid Lines (G)">
                        <i data-lucide="grid"></i> Grid Lines
                    </button>
                    <button id="action-fill-all" class="brutal-btn" title="Fill Entire Canvas">
                        <i data-lucide="palette"></i> Fill Canvas
                    </button>
                    <button id="action-clear" class="brutal-btn danger" title="Clear Frame">
                        <i data-lucide="trash-2"></i> Clear Frame
                    </button>
                </div>
            </div>

            <div class="sidebar-section">
                <h2>GRID SIZE</h2>
                <div class="grid-size-selector">
                    <button class="brutal-btn size-btn" data-size="8">8x8</button>
                    <button class="brutal-btn size-btn active" data-size="16">16x16</button>
                    <button class="brutal-btn size-btn" data-size="32">32x32</button>
                </div>
            </div>
        </aside>

        <!-- GONG -->
        <!-- DRAWING CANVAS (Center) -->
        <section class="canvas-workspace">
            <div class="canvas-outer-container">
                <div class="canvas-ruler horizontal-ruler" id="ruler-x"></div>
                <div class="canvas-inner-wrapper">
                    <div class="canvas-ruler vertical-ruler" id="ruler-y"></div>
                    <div id="pixel-grid" class="pixel-grid"></div>
                </div>
            </div>
            <div class="canvas-coords">
                <span id="coord-display">X: 0, Y: 0</span>
            </div>
        </section>

        <!-- GONG -->
        <!-- PALETTE & PREVIEW (Right) -->
        <aside class="sidebar palette-sidebar">
            <div class="sidebar-section">
                <h2>COLOR PALETTE</h2>
                <div class="active-color-display">
                    <div id="color-preview" class="color-preview-box"></div>
                    <div class="color-inputs">
                        <input type="color" id="color-picker-input" value="#FF007A">
                        <span id="color-hex-text">#FF007A</span>
                    </div>
                </div>

                <div class="palette-swatches" id="palette-swatches">
                    <!-- Standard Neo Brutalist Palette -->
                    <div class="swatch active" style="background-color: #FF007A;" data-color="#FF007A"></div>
                    <div class="swatch" style="background-color: #FFE600;" data-color="#FFE600"></div>
                    <div class="swatch" style="background-color: #00F0FF;" data-color="#00F0FF"></div>
                    <div class="swatch" style="background-color: #39FF14;" data-color="#39FF14"></div>
                    <div class="swatch" style="background-color: #FF6B00;" data-color="#FF6B00"></div>
                    <div class="swatch" style="background-color: #9D00FF;" data-color="#9D00FF"></div>
                    <div class="swatch" style="background-color: #FFFFFF;" data-color="#FFFFFF"></div>
                    <div class="swatch" style="background-color: #000000;" data-color="#000000"></div>
                    <div class="swatch" style="background-color: #7E7E7E;" data-color="#7E7E7E"></div>
                    <div class="swatch" style="background-color: #FF8AD8;" data-color="#FF8AD8"></div>
                    <div class="swatch" style="background-color: #FFF38A;" data-color="#FFF38A"></div>
                    <div class="swatch" style="background-color: #8AEFFF;" data-color="#8AEFFF"></div>
                </div>
            </div>

            <div class="sidebar-section">
                <h2>LIVE ANIMATION</h2>
                <div class="preview-panel">
                    <div class="preview-canvas-container">
                        <canvas id="animation-preview-canvas" width="128" height="128"></canvas>
                    </div>
                    <div class="preview-controls">
                        <button id="btn-play-pause" class="brutal-btn active" title="Play/Pause Animation">
                            <i data-lucide="pause"></i>
                        </button>
                        <div class="fps-slider-container">
                            <label for="fps-slider">Speed: <span id="fps-val">6</span> FPS</label>
                            <input type="range" id="fps-slider" min="1" max="20" value="6">
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <h2>EXPORTS</h2>
                <div class="export-options">
                    <button id="btn-export-png" class="brutal-btn primary">
                        <i data-lucide="download"></i> Download PNG
                    </button>
                    <button id="btn-export-svg" class="brutal-btn">
                        <i data-lucide="code-2"></i> Get SVG Code
                    </button>
                    <button id="btn-export-css" class="brutal-btn">
                        <i data-lucide="braces"></i> Get CSS Code
                    </button>
                </div>
            </div>
        </aside>
    </main>

    <!-- TIMELINE (Bottom Frame Strip) -->
    <footer class="app-timeline">
        <div class="timeline-header">
            <h2>ANIMATION FRAMES</h2>
            <div class="timeline-actions">
                <button id="frame-add" class="brutal-btn btn-sm">
                    <i data-lucide="plus"></i> Add Frame
                </button>
                <button id="frame-duplicate" class="brutal-btn btn-sm">
                    <i data-lucide="copy"></i> Duplicate
                </button>
                <button id="frame-delete" class="brutal-btn btn-sm danger" disabled>
                    <i data-lucide="trash-2"></i> Delete
                </button>
            </div>
        </div>
        <div class="timeline-frames-container" id="timeline-frames">
            <!-- Dynamic frames go here -->
        </div>
    </footer>

    <!-- EXPORT MODAL -->
    <div class="modal-overlay" id="export-modal">
        <div class="modal-container brutal-card">
            <div class="modal-header">
                <h3 id="modal-title">Export Code</h3>
                <button id="modal-close" class="brutal-btn btn-close"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <p id="modal-description">Copy the code below to use this pixel art in your own designs.</p>
                <div class="code-output-container">
                    <textarea id="modal-code-textarea" readonly></textarea>
                    <button id="modal-copy-btn" class="brutal-btn primary">
                        <i data-lucide="copy"></i> Copy Code
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="brutal-toast">
        <span id="toast-message">Copied to clipboard!</span>
    </div>

    <!-- Application Javascript -->
    <script src="app.js"></script>
</body>

</html>
